events { }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Serve static Blazor WASM files, fallback to index.html for SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Reverse-proxy API calls to the server container
        location /api/ {
            proxy_pass http://server:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Reverse-proxy Scalar API docs
        location /scalar/ {
            proxy_pass http://server:8080/scalar/;
            proxy_set_header Host $host;
        }

        # Reverse-proxy OpenAPI spec
        location /openapi/ {
            proxy_pass http://server:8080/openapi/;
            proxy_set_header Host $host;
        }

        # Proper MIME types for Blazor WASM files
        location ~* \.(dll|wasm)$ {
            types {
                application/octet-stream dll wasm;
            }
        }

        #making sure index.html is not cached, so that the browser always fetches the latest version of the app
        location = /index.html {
            add_header Cache-Control "no-store";
        }

        location ~* \.css$ {
            add_header Cache-Control "no-cache";
        }

        # Images/fonts rarely change and are safe to cache long-term.
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
