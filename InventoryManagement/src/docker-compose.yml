services:
  # PostgreSQL Database
  db:
    image: postgres:18.4
    container_name: inventory-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: InventoryDb
    ports:
      - "5454:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # ASP.NET Core Web API
  server:
    build:
      context: .
      dockerfile: InventorySystem.Server/Dockerfile
    container_name: inventory-server
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=InventoryDb;Username=admin;Password=password
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

  # Blazor WASM Client (with nginx) 
  client:
    build:
      context: .
      dockerfile: InventorySystem.Client/Dockerfile
    container_name: inventory-client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
