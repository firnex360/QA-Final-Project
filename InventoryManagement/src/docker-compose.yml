services:
  # PostgreSQL Database 
  db:
    image: postgres:18.4
    container_name: inventory-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: InventoryDb
    ports:
      - "5454:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d InventoryDb"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: on-failure:3

  # ASP.NET Core Web API 
  server:
    build:
      context: .
      dockerfile: InventorySystem.Server/Dockerfile
    container_name: inventory-server
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=InventoryDb;Username=admin;Password=password
      - Keycloak__Authority=http://localhost:8080/realms/inventory-realm
      - Keycloak__MetadataAddress=http://keycloak:8080/realms/inventory-realm/.well-known/openid-configuration
      - OTLP__Endpoint=http://alloy:4317
    ports:
      - "8090:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/openapi/v1.json || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: on-failure:3

  # Blazor WASM Client (served by nginx) 
  client:
    build:
      context: .
      dockerfile: InventorySystem.Client/Dockerfile
    container_name: inventory-client
    ports:
      - "9090:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: on-failure:3

  # Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: keycloak
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    ports:
      - "8080:8080"
    command: ["start-dev", "--import-realm"]
    volumes:
      - keycloak-volume:/opt/keycloak/data
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    restart: on-failure:3

  # Prometheus — scrapes the API's /metrics endpoint
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: on-failure:3

  # Grafana — dashboards over Prometheus (datasource + dashboard auto-provisioned)
  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: on-failure:3

volumes:
  pgdata:
  keycloak-volume:
  prometheus-data:
  grafana-data:
