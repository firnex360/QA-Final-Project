name: Move Issue to Review on PR Ready
on:
  pull_request:
    types: [ready_for_review]

jobs:
  move-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issue to Review column
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const repoName = context.repo.repo;
            const repoOwner = context.repo.owner;

            // 1. Fetch the linked issues from the PR
            const query = `query($owner:String!, $repo:String!, $pr:Int!) {
              repository(owner:$owner, name:$repo) {
                pullRequest(number:$pr) {
                  closingIssuesReferences(first: 5) {
                    nodes {
                      id
                      projectItems(first: 5) {
                        nodes {
                          id
                          project {
                            title
                            id
                            fields(first: 20) {
                              nodes {
                                ... on ProjectV2FieldCommon {
                                  id
                                  name
                                }
                                ... on ProjectV2SingleSelectField {
                                  options {
                                    id
                                    name
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }`;

            const result = await github.graphql(query, {
              owner: repoOwner,
              repo: repoName,
              pr: prNumber
            });

            const issues = result.repository.pullRequest.closingIssuesReferences.nodes;
            
            if (issues.length === 0) {
              console.log("DEBUG: No linked issues found for this PR. Did you put 'Closes #123' in the PR description?");
              return;
            }

            console.log(`DEBUG: Found ${issues.length} linked issue(s).`);

            // 2. Loop through linked issues and update their status to "Review"
            for (const issue of issues) {
              for (const item of issue.projectItems.nodes) {
                
                // Find the Status field and the "In review" option
                const statusField = item.project.fields.nodes.find(f => f.name === 'Status');
                
                if (!statusField) {
                  const availableFields = item.project.fields.nodes.map(f => f.name).join(', ');
                  console.log(`DEBUG: Could not find a field named 'Status'. Available fields are: ${availableFields}`);
                  continue; 
                }

                const reviewOption = statusField?.options?.find(o => o.name === 'In review');

                if (!reviewOption) {
                  const availableOptions = statusField.options.map(o => o.name).join(', ');
                  console.log(`DEBUG: Could not find an option named 'In review'. Available options are: ${availableOptions}`);
                  continue;
                }

                // If both are found, execute the move!
                if (statusField && reviewOption) {
                  console.log(`DEBUG: Found Status field and 'In review' option. Attempting to move...`);
                  const updateMutation = `mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }) {
                      projectV2Item { id }
                    }
                  }`;

                  try {
                    await github.graphql(updateMutation, {
                      projectId: item.project.id,
                      itemId: item.id,
                      fieldId: statusField.id,
                      optionId: reviewOption.id
                    });
                    console.log(`Successfully moved issue item ${item.id} to In review column.`);
                  } catch (error) {
                    console.error(`Failed to move issue ${item.id}:`, error);
                  }
                }
              }
            }
